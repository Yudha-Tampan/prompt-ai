<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tambah Prompt — Prompthive</title>
<link rel="icon" type="image/svg+xml" href="assets/img/logo.svg" />
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="css/style.css" />
</head>
<body class="antialiased">

<div id="navbarMount"></div>

<main class="max-w-3xl mx-auto px-5 sm:px-8 py-14">

<div class="mb-8">
<span class="chip inline-block mb-4">Kontribusi Baru</span>
<h1 class="font-display text-3xl font-semibold mb-2">Tambahkan Prompt Baru</h1>
<p class="text-sub text-sm">Bagikan prompt terbaikmu ke seluruh komunitas Prompthive. Tidak ada batas panjang tulisan.</p>
</div>

<form id="uploadForm" class="surface rounded-2xl p-6 sm:p-8 space-y-5 animate-fade-up">

<div>
<label class="text-sm font-medium mb-1.5 block">Judul Prompt</label>
<input type="text" id="title" class="field w-full px-4 py-3 rounded-xl text-sm" placeholder="Contoh: Asisten Penulisan Artikel SEO" required />
</div>

<div>
<label class="text-sm font-medium mb-1.5 block">Kategori <span class="text-sub font-normal">(pilih 3 sampai 6 kategori)</span></label>
<div id="categoryChips" class="flex flex-wrap gap-2"></div>
<p id="categoryHint" class="text-xs text-sub mt-2">0 kategori dipilih</p>
</div>

<div>
<label class="text-sm font-medium mb-1.5 block">Password <span class="text-sub font-normal">(opsional)</span></label>
<input type="text" id="password" class="field w-full px-4 py-3 rounded-xl text-sm" placeholder="Kosongkan jika tidak perlu" />
</div>

<div>
<label class="text-sm font-medium mb-1.5 block">Isi Prompt</label>
<textarea id="content" class="field w-full px-4 py-3 rounded-xl text-sm" style="min-height:280px" placeholder="Tulis isi prompt lengkap di sini, tanpa batas panjang..." required></textarea>
</div>

<div class="flex items-center gap-3 pt-2">
<button type="submit" class="btn-primary px-6 py-3 rounded-xl text-sm">Kirim Prompt</button>
<a href="index.html" class="btn-secondary px-6 py-3 rounded-xl text-sm">Batal</a>
</div>

</form>
</main>

<div id="footerMount"></div>

<script src="js/env.js"></script>
<script src="js/storage.js"></script>
<script src="js/toast.js"></script>
<script src="js/auth.js"></script>
<script src="js/theme.js"></script>
<script src="js/navbar.js"></script>
<script src="js/prompts.js"></script>
<script>
const MIN_CATEGORIES = 3;
const MAX_CATEGORIES = 6;
let selectedCategories = [];

function renderCategoryChips() {
  const mount = document.getElementById("categoryChips");
  mount.innerHTML = CATEGORIES.map((c) => {
    const activeClass = selectedCategories.includes(c) ? "chip active" : "chip";
    return '<button type="button" class="' + activeClass + ' category-chip-btn" data-cat="' + c + '">' + c + "</button>";
  }).join("");

  mount.querySelectorAll(".category-chip-btn").forEach((btn) => {
    btn.addEventListener("click", () => {
      const cat = btn.dataset.cat;
      const idx = selectedCategories.indexOf(cat);

      if (idx > -1) {
        selectedCategories.splice(idx, 1);
      } else {
        if (selectedCategories.length >= MAX_CATEGORIES) {
          showToast("Maksimal 6 kategori boleh dipilih", "error");
          return;
        }
        selectedCategories.push(cat);
      }

      renderCategoryChips();
      updateCategoryHint();
    });
  });
}

function updateCategoryHint() {
  const hint = document.getElementById("categoryHint");
  hint.textContent = selectedCategories.length + " dari maksimal " + MAX_CATEGORIES + " kategori dipilih (minimal " + MIN_CATEGORIES + ")";
}

async function initUpload() {
  await seedDatabase();
  const user = requireAuth();
  if (!user) return;

  renderNavbar("");
  renderFooter();

  renderCategoryChips();
  updateCategoryHint();

  const form = document.getElementById("uploadForm");

  form.addEventListener("submit", (e) => {
    e.preventDefault();

    const title = document.getElementById("title").value.trim();
    const content = document.getElementById("content").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!title) {
      showToast("Judul prompt tidak boleh kosong", "error");
      return;
    }

    if (!content) {
      showToast("Isi prompt tidak boleh kosong", "error");
      return;
    }

    if (selectedCategories.length < MIN_CATEGORIES) {
      showToast("Pilih minimal " + MIN_CATEGORIES + " kategori", "error");
      return;
    }

    if (selectedCategories.length > MAX_CATEGORIES) {
      showToast("Pilih maksimal " + MAX_CATEGORIES + " kategori", "error");
      return;
    }

    const newPrompt = {
      id: generateId("p"),
      userId: user.id,
      username: user.username,
      title,
      password,
      category: selectedCategories[0],
      categories: selectedCategories.slice(),
      content,
      createdAt: new Date().toISOString()
    };

    const prompts = getPrompts();
    prompts.unshift(newPrompt);
    savePrompts(prompts);

    showToast("Prompt berhasil ditambahkan", "success");
    setTimeout(() => {
      window.location.href = "index.html";
    }, 700);
  });
}

initUpload();
</script>
</body>
</html>
