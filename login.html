<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Masuk — Prompthive</title>
<link rel="icon" type="image/svg+xml" href="assets/img/logo.svg" />
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="css/style.css" />
</head>
<body class="antialiased">

<div id="navbarMount"></div>

<main class="min-h-[calc(100vh-64px)] flex items-center justify-center px-5 py-16 hero-noise">
<div class="w-full max-w-md surface rounded-2xl p-8 sm:p-10 animate-scale-in">

<div class="text-center mb-8">
<img src="assets/img/logo.svg" alt="Prompthive" class="w-12 h-12 mx-auto mb-4" />
<h1 class="font-display text-2xl font-semibold mb-2">Selamat datang kembali</h1>
<p class="text-sub text-sm">Masuk untuk mengelola dan membagikan prompt kamu.</p>
</div>

<form id="loginForm" class="space-y-4">
<div>
<label class="text-sm font-medium mb-1.5 block">Username atau Email</label>
<input type="text" id="identifier" class="field w-full px-4 py-3 rounded-xl text-sm" placeholder="clara atau clara@example.com" required />
</div>
<div>
<label class="text-sm font-medium mb-1.5 block">Password</label>
<input type="password" id="password" class="field w-full px-4 py-3 rounded-xl text-sm" placeholder="Masukkan password" required />
</div>
<p id="errorMsg" class="text-sm text-red-500 hidden"></p>
<button type="submit" class="btn-primary w-full py-3 rounded-xl text-sm">Masuk</button>
</form>

<p class="text-center text-sm text-sub mt-6">
Belum punya akun? <a href="register.html" class="text-indigo-500 font-medium hover:underline">Daftar sekarang</a>
</p>

</div>
</main>

<div id="footerMount"></div>

<script src="js/env.js"></script>
<script src="js/storage.js"></script>
<script src="js/toast.js"></script>
<script src="js/auth.js"></script>
<script src="js/theme.js"></script>
<script src="js/navbar.js"></script>
<script>
async function initLogin() {
  await seedDatabase();
  renderNavbar("");
  renderFooter();

  const existingUser = getCurrentUser();
  if (existingUser) {
    window.location.href = "profile.html";
    return;
  }

  const form = document.getElementById("loginForm");
  const errorMsg = document.getElementById("errorMsg");

  form.addEventListener("submit", (e) => {
    e.preventDefault();
    errorMsg.classList.add("hidden");

    const identifier = document.getElementById("identifier").value.trim();
    const password = document.getElementById("password").value;

    const result = loginUser(identifier, password);

    if (!result.success) {
      errorMsg.textContent = result.message;
      errorMsg.classList.remove("hidden");
      showToast(result.message, "error");
      return;
    }

    showToast("Berhasil masuk, selamat datang " + result.user.name, "success");
    setTimeout(() => {
      window.location.href = "index.html";
    }, 700);
  });
}

initLogin();
</script>
</body>
</html>
